<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 12 — The Tuna-17 (Surface-17) connectivity</title>
  <desc>Author: Alessandro Pezzali. The 17-qubit Tuna-17 chip as a distance-3 rotated surface code: 9 data qubits and 8 ancilla qubits joined by 24 data-ancilla couplers. The winning corner bond (0,1) is highlighted; the most-connected hub Q8, which gave the worst pairs, is marked.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="620" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">The Tuna-17 chip: a surface-code lattice</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Distance-3 rotated surface code &#8212; 9 data + 8 ancilla qubits, 24 data&#8211;ancilla couplers</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- bonds (background) -->
  <g stroke="#cbd5e1" stroke-width="2.5">
    <line x1="320" y1="135" x2="390" y2="200"/>
    <line x1="250" y1="200" x2="320" y2="265"/>
    <line x1="390" y1="200" x2="320" y2="265"/>
    <line x1="390" y1="200" x2="460" y2="265"/>
    <line x1="530" y1="200" x2="460" y2="265"/>
    <line x1="530" y1="200" x2="595" y2="265"/>
    <line x1="320" y1="265" x2="250" y2="330"/>
    <line x1="320" y1="265" x2="390" y2="330"/>
    <line x1="460" y1="265" x2="390" y2="330"/>
    <line x1="460" y1="265" x2="530" y2="330"/>
    <line x1="595" y1="265" x2="530" y2="330"/>
    <line x1="250" y1="330" x2="185" y2="395"/>
    <line x1="250" y1="330" x2="320" y2="395"/>
    <line x1="390" y1="330" x2="320" y2="395"/>
    <line x1="390" y1="330" x2="460" y2="395"/>
    <line x1="530" y1="330" x2="460" y2="395"/>
    <line x1="185" y1="395" x2="250" y2="460"/>
    <line x1="320" y1="395" x2="250" y2="460"/>
    <line x1="320" y1="395" x2="390" y2="460"/>
    <line x1="460" y1="395" x2="390" y2="460"/>
    <line x1="460" y1="395" x2="530" y2="460"/>
    <line x1="390" y1="460" x2="460" y2="525"/>
    <line x1="530" y1="460" x2="460" y2="525"/>
  </g>
  <!-- winner bond (0,1) highlighted -->
  <line x1="320" y1="135" x2="250" y2="200" stroke="#ea8a2f" stroke-width="4.5"/>

  <!-- Q8 hub highlight -->
  <circle cx="390" cy="330" r="34" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- ancilla qubits (gray) -->
  <g>
    <circle cx="320" cy="135" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="595" cy="265" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="185" cy="395" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="460" cy="525" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="320" cy="265" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="460" cy="265" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="320" cy="395" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="460" cy="395" r="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  </g>
  <g font-size="12.5" font-weight="600" fill="#5a6b7d" text-anchor="middle">
    <text x="320" y="140">Q0</text>
    <text x="595" y="270">Q6</text>
    <text x="185" y="400">Q10</text>
    <text x="460" y="530">Q16</text>
    <text x="320" y="270">Q4</text>
    <text x="460" y="270">Q5</text>
    <text x="320" y="400">Q11</text>
    <text x="460" y="400">Q12</text>
  </g>

  <!-- data qubits (blue) -->
  <g>
    <circle cx="250" cy="200" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="390" cy="200" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="530" cy="200" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="250" cy="330" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="390" cy="330" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="530" cy="330" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="250" cy="460" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="390" cy="460" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="530" cy="460" r="22" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
  </g>
  <g font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">
    <text x="250" y="205">Q1</text>
    <text x="390" y="205">Q2</text>
    <text x="530" y="205">Q3</text>
    <text x="250" y="335">Q7</text>
    <text x="390" y="335">Q8</text>
    <text x="530" y="335">Q9</text>
    <text x="250" y="465">Q13</text>
    <text x="390" y="465">Q14</text>
    <text x="530" y="465">Q15</text>
  </g>

  <!-- callouts -->
  <text x="250" y="168" font-size="11" font-weight="700" fill="#ea8a2f" text-anchor="middle">winner (0,1)</text>
  <text x="390" y="376" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">hub Q8 &#8212; worst pairs</text>

  <!-- legend -->
  <g>
    <circle cx="650" cy="360" r="14" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="674" y="365" font-size="13" fill="#334155">data qubit (9)</text>
    <circle cx="650" cy="398" r="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="674" y="403" font-size="13" fill="#334155">ancilla qubit (8)</text>
    <line x1="636" y1="434" x2="664" y2="434" stroke="#ea8a2f" stroke-width="4.5"/>
    <text x="674" y="439" font-size="13" fill="#334155">winning bond (0,1)</text>
    <line x1="636" y1="466" x2="664" y2="466" stroke="#cbd5e1" stroke-width="2.5"/>
    <text x="674" y="471" font-size="13" fill="#334155">native CZ bond</text>
  </g>
  <text x="636" y="506" font-size="11.5" fill="#5a6b7d">Every one of the 24 bonds</text>
  <text x="636" y="522" font-size="11.5" fill="#5a6b7d">joins a data qubit to an ancilla.</text>

  <text x="780" y="608" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
