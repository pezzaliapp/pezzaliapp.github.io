<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 15 — The result in context: raw and readout-mitigated S</title>
  <desc>Author: Alessandro Pezzali. S_raw = 2.494 +/- 0.039 and S_mitigated = 2.736 +/- 0.047 shown between the classical bound (2) and the Tsirelson bound (2.828). The gap between the two markers is readout error. The three raw blocks appear as faint points behind S_raw.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">The result in context</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Raw and readout-mitigated S, between the classical limit and the Tsirelson bound</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- scale 1.5..3.0 mapped 120..720 (400px/unit) ; track y=188 -->
  <rect x="120" y="168" width="200" height="40" fill="#eef2f6"/>
  <rect x="320" y="168" width="331.2" height="40" fill="#e0efff"/>
  <rect x="651.2" y="168" width="68.8" height="40" fill="#f8fafc"/>
  <rect x="120" y="168" width="600" height="40" fill="none" stroke="#cbd5e1" stroke-width="1.3"/>

  <!-- bound lines -->
  <line x1="320" y1="140" x2="320" y2="246" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="320" y="130" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">classical bound = 2</text>
  <line x1="651.2" y1="140" x2="651.2" y2="246" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="651.2" y="130" font-size="12.5" font-weight="600" fill="#0284c7" text-anchor="middle">Tsirelson = 2&#8730;2 &#8776; 2.828</text>

  <!-- zone labels -->
  <text x="220" y="230" font-size="11.5" fill="#64748b" text-anchor="middle">classically allowed</text>
  <text x="415" y="230" font-size="11.5" fill="#2563eb" text-anchor="middle">quantum region</text>

  <!-- faint individual raw blocks: 2.524, 2.436, 2.523 -> x=529.6, 494.4, 529.2 -->
  <g fill="#cbd5e1">
    <circle cx="529.6" cy="159" r="3.5"/>
    <circle cx="494.4" cy="159" r="3.5"/>
    <circle cx="529.2" cy="159" r="3.5"/>
  </g>
  <text x="470" y="151" font-size="10" fill="#94a3b8" text-anchor="middle">3 raw blocks</text>

  <!-- S_raw marker at x=517.6 (2.494), error +/-15.6px -->
  <line x1="502" y1="188" x2="533.2" y2="188" stroke="#1a2433" stroke-width="2"/>
  <line x1="502" y1="182" x2="502" y2="194" stroke="#1a2433" stroke-width="2"/>
  <line x1="533.2" y1="182" x2="533.2" y2="194" stroke="#1a2433" stroke-width="2"/>
  <circle cx="517.6" cy="188" r="8" fill="#1a2433"/>

  <!-- S_mitigated marker at x=614.4 (2.736), error +/-18.8px, hollow orange -->
  <line x1="595.6" y1="188" x2="633.2" y2="188" stroke="#ea8a2f" stroke-width="2"/>
  <line x1="595.6" y1="182" x2="595.6" y2="194" stroke="#ea8a2f" stroke-width="2"/>
  <line x1="633.2" y1="182" x2="633.2" y2="194" stroke="#ea8a2f" stroke-width="2"/>
  <circle cx="614.4" cy="188" r="8" fill="#ffffff" stroke="#ea8a2f" stroke-width="2.5"/>

  <!-- readout-error arrow between markers -->
  <line x1="525.6" y1="220" x2="606.4" y2="220" stroke="#ea8a2f" stroke-width="1.6" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 7 1 L 1 4 L 7 7" fill="none" stroke="#ea8a2f" stroke-width="1.4"/>
    </marker>
  </defs>
  <text x="566" y="238" font-size="11.5" font-weight="600" fill="#ea8a2f" text-anchor="middle">readout error &#8776; 0.24</text>

  <!-- S_raw callout (upper) -->
  <line x1="517.6" y1="196" x2="517.6" y2="266" stroke="#1a2433" stroke-width="1.1"/>
  <text x="517.6" y="284" font-size="15" font-weight="700" fill="#1a2433" text-anchor="middle">S_raw = 2.494 &#177; 0.039</text>
  <text x="517.6" y="301" font-size="11.5" fill="#5a6b7d" text-anchor="middle">88.2% of Tsirelson &#183; 12.7&#963;</text>

  <!-- S_mitigated callout (lower, staggered) -->
  <line x1="614.4" y1="196" x2="614.4" y2="322" stroke="#ea8a2f" stroke-width="1.1"/>
  <text x="614.4" y="340" font-size="15" font-weight="700" fill="#b4691a" text-anchor="middle">S_mitigated = 2.736 &#177; 0.047</text>
  <text x="614.4" y="357" font-size="11.5" fill="#5a6b7d" text-anchor="middle">96.7% &#183; readout-corrected</text>

  <!-- axis -->
  <g stroke="#94a3b8" stroke-width="1.2">
    <line x1="120" y1="380" x2="120" y2="388"/>
    <line x1="320" y1="380" x2="320" y2="388"/>
    <line x1="520" y1="380" x2="520" y2="388"/>
    <line x1="720" y1="380" x2="720" y2="388"/>
  </g>
  <line x1="120" y1="380" x2="720" y2="380" stroke="#94a3b8" stroke-width="1.2"/>
  <g font-size="11" fill="#5a6b7d" text-anchor="middle">
    <text x="120" y="403">1.5</text>
    <text x="320" y="403">2.0</text>
    <text x="520" y="403">2.5</text>
    <text x="720" y="403">3.0</text>
  </g>
  <text x="420" y="424" font-size="12" fill="#5a6b7d" text-anchor="middle">CHSH value S</text>

  <text x="780" y="458" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
