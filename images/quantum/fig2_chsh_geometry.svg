<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 2 — CHSH measurement geometry</title>
  <desc>Author: Alessandro Pezzali. Measurement directions in the X-Z plane of the Bloch sphere. Alice measures along Z (a) and X (a'); Bob measures along (Z+X)/sqrt(2) (b) and (Z-X)/sqrt(2) (b'). Three of the four Alice-Bob pairs are 45 degrees apart (positive correlation) and the pair (a',b') is 135 degrees apart (negative correlation).</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="560" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">CHSH measurement geometry</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Directions in the X&#8211;Z plane, chosen so that neighbouring axes are 45&#176; apart</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <defs>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0ea5e9"/></marker>
  </defs>

  <!-- circle centre -->
  <g transform="translate(300,320)">
    <circle cx="0" cy="0" r="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- axes -->
    <line x1="-210" y1="0" x2="210" y2="0" stroke="#94a3b8" stroke-width="1.2"/>
    <line x1="0" y1="210" x2="0" y2="-210" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="0" y="-222" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle">Z</text>
    <text x="224" y="5" font-size="14" font-weight="600" fill="#64748b">X</text>

    <!-- 45 deg arc right: a (up) to b (up-right) -->
    <path d="M 0 -60 A 60 60 0 0 1 42.4 -42.4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="34" y="-62" font-size="11.5" fill="#0284c7">45&#176;</text>
    <!-- 45 deg arc left: a (up) to b' (up-left) -->
    <path d="M 0 -60 A 60 60 0 0 0 -42.4 -42.4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="-52" y="-62" font-size="11.5" fill="#0284c7">45&#176;</text>

    <!-- Alice a : along Z (up) -->
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrA)"/>
    <text x="12" y="-150" font-size="15" font-weight="700" fill="#2563eb">a (Z)</text>

    <!-- Alice a' : along X (right) -->
    <line x1="0" y1="0" x2="180" y2="0" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrA)"/>
    <text x="120" y="24" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">a&#8242; (X)</text>

    <!-- Bob b : 45 deg up-right (Z+X)/sqrt2 -->
    <line x1="0" y1="0" x2="127.3" y2="-127.3" stroke="#0ea5e9" stroke-width="3.5" marker-end="url(#arrB)"/>
    <text x="150" y="-120" font-size="15" font-weight="700" fill="#0284c7">b</text>

    <!-- Bob b' : 135 deg up-left (Z-X)/sqrt2 -->
    <line x1="0" y1="0" x2="-127.3" y2="-127.3" stroke="#0ea5e9" stroke-width="3.5" marker-end="url(#arrB)"/>
    <text x="-158" y="-120" font-size="15" font-weight="700" fill="#0284c7">b&#8242;</text>

    <circle cx="0" cy="0" r="4" fill="#1a2433"/>
  </g>

  <!-- Legend -->
  <g transform="translate(556,140)">
    <rect x="0" y="0" width="236" height="236" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="16" y="30" font-size="14" font-weight="700" fill="#1a2433">Directions</text>

    <line x1="16" y1="52" x2="44" y2="52" stroke="#2563eb" stroke-width="3.5"/>
    <text x="52" y="56" font-size="12.5" fill="#334155">Alice &#8211; a  =  Z</text>
    <line x1="16" y1="78" x2="44" y2="78" stroke="#2563eb" stroke-width="3.5"/>
    <text x="52" y="82" font-size="12.5" fill="#334155">Alice &#8211; a&#8242; =  X</text>

    <line x1="16" y1="112" x2="44" y2="112" stroke="#0ea5e9" stroke-width="3.5"/>
    <text x="52" y="116" font-size="12.5" fill="#334155">Bob &#8211; b  = (Z+X)/&#8730;2</text>
    <line x1="16" y1="138" x2="44" y2="138" stroke="#0ea5e9" stroke-width="3.5"/>
    <text x="52" y="142" font-size="12.5" fill="#334155">Bob &#8211; b&#8242; = (Z&#8722;X)/&#8730;2</text>

    <line x1="16" y1="164" x2="220" y2="164" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="16" y="186" font-size="11.5" fill="#334155">Three pairs are 45&#176; apart</text>
    <text x="16" y="203" font-size="11.5" fill="#2563eb">&#8594; E &#8776; +0.71  (agree)</text>
    <text x="16" y="223" font-size="11.5" fill="#334155">The pair (a&#8242;, b&#8242;) is 135&#176; apart</text>
    <text x="16" y="240" font-size="11.5" fill="#ef4444">&#8594; E &#8776; &#8722;0.71  (disagree)</text>
  </g>

  <text x="780" y="544" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
