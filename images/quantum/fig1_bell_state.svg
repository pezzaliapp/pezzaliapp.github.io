<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 1 — The Bell state used in the experiment</title>
  <desc>Author: Alessandro Pezzali. The two-qubit maximally entangled state (|00> + |11>)/sqrt(2): outcomes 00 and 11 each occur with probability one half; 01 and 10 never occur.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">The Bell state |&#934;&#8314;&#10217;</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Two qubits prepared in a single, shared, maximally entangled state</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Left: two entangled qubits -->
  <circle cx="150" cy="210" r="46" fill="#eff5ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="150" y="205" font-size="20" font-weight="700" fill="#2563eb" text-anchor="middle">A</text>
  <text x="150" y="226" font-size="12" fill="#5a6b7d" text-anchor="middle">qubit 0</text>

  <circle cx="360" cy="210" r="46" fill="#e6f6fd" stroke="#0ea5e9" stroke-width="2.5"/>
  <text x="360" y="205" font-size="20" font-weight="700" fill="#0284c7" text-anchor="middle">B</text>
  <text x="360" y="226" font-size="12" fill="#5a6b7d" text-anchor="middle">qubit 1</text>

  <!-- entanglement link -->
  <path d="M 196 210 q 32 -26 64 0 q 32 26 64 0" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <text x="255" y="170" font-size="12.5" fill="#5a6b7d" text-anchor="middle" font-style="italic">entangled</text>

  <text x="255" y="300" font-size="13.5" fill="#334155" text-anchor="middle">Measuring one qubit instantly fixes the other:</text>
  <text x="255" y="322" font-size="13.5" fill="#334155" text-anchor="middle">the two results are always perfectly correlated.</text>

  <!-- Right: probability bars -->
  <g transform="translate(500,120)">
    <text x="130" y="6" font-size="14" font-weight="600" fill="#1a2433" text-anchor="middle">Outcome probabilities</text>
    <!-- axis -->
    <line x1="20" y1="30" x2="20" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="20" y1="190" x2="260" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="12" y="34" font-size="11" fill="#5a6b7d" text-anchor="end">0.5</text>
    <text x="12" y="194" font-size="11" fill="#5a6b7d" text-anchor="end">0</text>
    <line x1="20" y1="30" x2="260" y2="30" stroke="#e2e8f0" stroke-width="1"/>

    <!-- bars: 00 and 11 at 0.5 (160px), 01 and 10 at 0 -->
    <rect x="42" y="30" width="40" height="160" rx="3" fill="#3b82f6"/>
    <rect x="102" y="188" width="40" height="2" rx="1" fill="#cbd5e1"/>
    <rect x="162" y="188" width="40" height="2" rx="1" fill="#cbd5e1"/>
    <rect x="222" y="30" width="40" height="160" rx="3" fill="#3b82f6"/>

    <text x="62"  y="206" font-size="12" fill="#334155" text-anchor="middle">00</text>
    <text x="122" y="206" font-size="12" fill="#334155" text-anchor="middle">01</text>
    <text x="182" y="206" font-size="12" fill="#334155" text-anchor="middle">10</text>
    <text x="242" y="206" font-size="12" fill="#334155" text-anchor="middle">11</text>
  </g>

  <!-- Equation -->
  <line x1="40" y1="378" x2="780" y2="378" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="410" y="420" font-size="22" fill="#1a2433" text-anchor="middle">|&#934;&#8314;&#10217; =
    <tspan font-size="16">1</tspan>
    <tspan font-size="14" dy="-2">/</tspan>
    <tspan font-size="16" dy="2">&#8730;2</tspan>
    ( |00&#10217; + |11&#10217; )</text>

  <text x="780" y="458" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
