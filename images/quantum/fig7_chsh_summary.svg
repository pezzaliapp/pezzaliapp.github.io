<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 7 — CHSH result against the classical and quantum bounds</title>
  <desc>Author: Alessandro Pezzali. The measured CHSH value S = 2.585 +/- 0.017 lies above the classical bound of 2 and below the Tsirelson bound of 2.828.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="400" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">The CHSH result in context</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Measured value against the classical limit and the quantum (Tsirelson) limit</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- scale 1.5..3.0 mapped 120..720 (400px/unit) ; track y=190 -->
  <!-- classical-allowed zone 1.5..2.0 -->
  <rect x="120" y="170" width="200" height="40" fill="#eef2f6"/>
  <!-- quantum zone 2.0..2.828 -->
  <rect x="320" y="170" width="331.4" height="40" fill="#e0efff"/>
  <!-- forbidden beyond tsirelson 2.828..3.0 -->
  <rect x="651.4" y="170" width="68.6" height="40" fill="#f8fafc"/>
  <rect x="120" y="170" width="600" height="40" fill="none" stroke="#cbd5e1" stroke-width="1.3"/>

  <!-- zone labels -->
  <text x="220" y="233" font-size="11.5" fill="#64748b" text-anchor="middle">classically allowed</text>
  <text x="485" y="233" font-size="11.5" fill="#2563eb" text-anchor="middle">quantum region</text>

  <!-- classical bound line at x=320 -->
  <line x1="320" y1="140" x2="320" y2="250" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="320" y="130" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">classical bound = 2</text>

  <!-- Tsirelson bound at x=651.4 -->
  <line x1="651.4" y1="140" x2="651.4" y2="250" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="651.4" y="130" font-size="12.5" font-weight="600" fill="#0284c7" text-anchor="middle">Tsirelson = 2&#8730;2 &#8776; 2.828</text>

  <!-- measured S at x=554 (2.585) with small error bar -->
  <line x1="547" y1="190" x2="561" y2="190" stroke="#1a2433" stroke-width="2"/>
  <line x1="547" y1="184" x2="547" y2="196" stroke="#1a2433" stroke-width="2"/>
  <line x1="561" y1="184" x2="561" y2="196" stroke="#1a2433" stroke-width="2"/>
  <circle cx="554" cy="190" r="8" fill="#1a2433"/>
  <text x="554" y="300" font-size="16" font-weight="700" fill="#1a2433" text-anchor="middle">S = 2.585 &#177; 0.017</text>
  <line x1="554" y1="210" x2="554" y2="278" stroke="#1a2433" stroke-width="1.2"/>

  <!-- axis ticks -->
  <line x1="120" y1="210" x2="720" y2="210" stroke="#94a3b8" stroke-width="1.2"/>
  <g font-size="11" fill="#5a6b7d" text-anchor="middle">
    <text x="120" y="345">1.5</text>
    <text x="320" y="345">2.0</text>
    <text x="520" y="345">2.5</text>
    <text x="720" y="345">3.0</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.2">
    <line x1="120" y1="322" x2="120" y2="330"/>
    <line x1="320" y1="322" x2="320" y2="330"/>
    <line x1="520" y1="322" x2="520" y2="330"/>
    <line x1="720" y1="322" x2="720" y2="330"/>
  </g>
  <text x="420" y="368" font-size="12" fill="#5a6b7d" text-anchor="middle">CHSH value S</text>

  <text x="780" y="388" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
