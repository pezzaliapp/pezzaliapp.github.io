<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 16 — The readout confusion matrix</title>
  <desc>Author: Alessandro Pezzali. The 4x4 readout confusion matrix M in the platform's reversed display basis b[1]b[0]. Columns are prepared states, rows are measured outcomes. Diagonal fidelities 0.945 to 0.965; off-diagonals are the readout errors that Section 7.5 removes.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="520" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">The readout confusion matrix</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Columns = prepared state, rows = measured outcome &#8212; in the platform's reversed display order b[1]b[0]</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- axis labels -->
  <text x="440" y="130" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">Prepared state &#8594;</text>
  <text x="200" y="300" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle" transform="rotate(-90 200 300)">Measured outcome &#8595;</text>

  <!-- column headers: col centers 307,381,455,529 -->
  <g font-size="13" font-weight="600" fill="#1a2433" text-anchor="middle">
    <text x="307" y="160">00</text>
    <text x="381" y="160">01</text>
    <text x="455" y="160">10</text>
    <text x="529" y="160">11</text>
  </g>
  <!-- row headers: row centers 207,281,355,429 -->
  <g font-size="13" font-weight="600" fill="#1a2433" text-anchor="end">
    <text x="258" y="212">00</text>
    <text x="258" y="286">01</text>
    <text x="258" y="360">10</text>
    <text x="258" y="434">11</text>
  </g>

  <!-- matrix cells: x0=270 y0=170, cell=74 -->
  <!-- row meas00 -->
  <rect x="270" y="170" width="74" height="74" fill="#1e40af"/>
  <rect x="344" y="170" width="74" height="74" fill="#e4eefb"/>
  <rect x="418" y="170" width="74" height="74" fill="#d3e3f8"/>
  <rect x="492" y="170" width="74" height="74" fill="#f5f8fc"/>
  <!-- row meas01 -->
  <rect x="270" y="244" width="74" height="74" fill="#e4eefb"/>
  <rect x="344" y="244" width="74" height="74" fill="#1e40af"/>
  <rect x="418" y="244" width="74" height="74" fill="#f0f5fc"/>
  <rect x="492" y="244" width="74" height="74" fill="#dbe8f9"/>
  <!-- row meas10 -->
  <rect x="270" y="318" width="74" height="74" fill="#bcd4f2"/>
  <rect x="344" y="318" width="74" height="74" fill="#f5f8fc"/>
  <rect x="418" y="318" width="74" height="74" fill="#1e40af"/>
  <rect x="492" y="318" width="74" height="74" fill="#eaf1fc"/>
  <!-- row meas11 -->
  <rect x="270" y="392" width="74" height="74" fill="#f5f8fc"/>
  <rect x="344" y="392" width="74" height="74" fill="#dbe8f9"/>
  <rect x="418" y="392" width="74" height="74" fill="#eaf1fc"/>
  <rect x="492" y="392" width="74" height="74" fill="#1e40af"/>

  <!-- diagonal emphasis borders -->
  <g fill="none" stroke="#ea8a2f" stroke-width="2.5">
    <rect x="270" y="170" width="74" height="74"/>
    <rect x="344" y="244" width="74" height="74"/>
    <rect x="418" y="318" width="74" height="74"/>
    <rect x="492" y="392" width="74" height="74"/>
  </g>
  <!-- grid outline -->
  <rect x="270" y="170" width="296" height="296" fill="none" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- cell values: diagonal white, off-diagonal dark -->
  <g font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">
    <text x="307" y="212">0.945</text>
    <text x="381" y="286">0.961</text>
    <text x="455" y="360">0.957</text>
    <text x="529" y="434">0.965</text>
  </g>
  <g font-size="12" fill="#334155" text-anchor="middle">
    <text x="381" y="212">0.018</text>
    <text x="455" y="212">0.027</text>
    <text x="529" y="212">0.000</text>
    <text x="307" y="286">0.014</text>
    <text x="455" y="286">0.004</text>
    <text x="529" y="286">0.023</text>
    <text x="307" y="360">0.041</text>
    <text x="381" y="360">0.000</text>
    <text x="529" y="360">0.012</text>
    <text x="307" y="434">0.000</text>
    <text x="381" y="434">0.021</text>
    <text x="455" y="434">0.012</text>
  </g>

  <!-- side note -->
  <g font-size="12.5" fill="#334155">
    <text x="600" y="196" font-weight="600" fill="#1a2433">Reading the matrix</text>
    <text x="600" y="220">Diagonal (orange) = correct</text>
    <text x="600" y="238">readout, 94.5&#8211;96.5%.</text>
    <text x="600" y="264">Off-diagonal = misreads;</text>
    <text x="600" y="282">the largest, 0.041, is a</text>
    <text x="600" y="300">prepared-00-read-as-10 flip.</text>
    <text x="600" y="330" font-style="italic" fill="#5a6b7d">Each column sums to 1.000.</text>
    <text x="600" y="360" font-weight="600" fill="#ea8a2f">Bit order is reversed:</text>
    <text x="600" y="378" fill="#5a6b7d">states labelled b[1]b[0],</text>
    <text x="600" y="396" fill="#5a6b7d">confirmed by the 01/10 runs.</text>
    <text x="600" y="426">Correction: p_true = M&#8315;&#185; p_meas.</text>
  </g>

  <text x="780" y="508" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
