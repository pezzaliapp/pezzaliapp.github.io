<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 6 — Measured correlations</title>
  <desc>Author: Alessandro Pezzali. Correlation value E = P00 + P11 - P01 - P10 for each configuration. Three correlations are positive and one is negative, as required for a CHSH violation.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="440" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">Measured correlations</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">E = P(00) + P(11) &#8722; P(01) &#8722; P(10) for each configuration</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- axis: zero line y=250, +1 at y=110, -1 at y=390 ; scale 140/unit -->
  <line x1="120" y1="110" x2="120" y2="390" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="120" y1="250" x2="740" y2="250" stroke="#334155" stroke-width="1.6"/>
  <line x1="120" y1="110" x2="740" y2="110" stroke="#eef2f6" stroke-width="1"/>
  <line x1="120" y1="180" x2="740" y2="180" stroke="#eef2f6" stroke-width="1"/>
  <line x1="120" y1="320" x2="740" y2="320" stroke="#eef2f6" stroke-width="1"/>
  <line x1="120" y1="390" x2="740" y2="390" stroke="#eef2f6" stroke-width="1"/>
  <text x="112" y="114" font-size="11" fill="#5a6b7d" text-anchor="end">+1.0</text>
  <text x="112" y="184" font-size="11" fill="#5a6b7d" text-anchor="end">+0.5</text>
  <text x="112" y="254" font-size="11" fill="#5a6b7d" text-anchor="end">0</text>
  <text x="112" y="324" font-size="11" fill="#5a6b7d" text-anchor="end">&#8722;0.5</text>
  <text x="112" y="394" font-size="11" fill="#5a6b7d" text-anchor="end">&#8722;1.0</text>

  <!-- bars width 90, centres at 200,340,480,620 -->
  <!-- E00 +0.637 -> 89.2px -->
  <rect x="160" y="160.8" width="90" height="89.2" rx="4" fill="#3b82f6"/>
  <text x="205" y="150" font-size="14" font-weight="700" fill="#1a2433" text-anchor="middle">+0.637</text>
  <text x="205" y="272" font-size="12.5" fill="#334155" text-anchor="middle">E&#8320;&#8320;</text>
  <text x="205" y="290" font-size="10.5" fill="#5a6b7d" text-anchor="middle">Z , b</text>

  <!-- E01 +0.643 -> 90.0 -->
  <rect x="300" y="160.0" width="90" height="90.0" rx="4" fill="#3b82f6"/>
  <text x="345" y="150" font-size="14" font-weight="700" fill="#1a2433" text-anchor="middle">+0.643</text>
  <text x="345" y="272" font-size="12.5" fill="#334155" text-anchor="middle">E&#8320;&#8321;</text>
  <text x="345" y="290" font-size="10.5" fill="#5a6b7d" text-anchor="middle">Z , b&#8242;</text>

  <!-- E10 +0.662 -> 92.7 -->
  <rect x="440" y="157.3" width="90" height="92.7" rx="4" fill="#3b82f6"/>
  <text x="485" y="147" font-size="14" font-weight="700" fill="#1a2433" text-anchor="middle">+0.662</text>
  <text x="485" y="272" font-size="12.5" fill="#334155" text-anchor="middle">E&#8321;&#8320;</text>
  <text x="485" y="290" font-size="10.5" fill="#5a6b7d" text-anchor="middle">X , b</text>

  <!-- E11 -0.643 -> 90.0 down -->
  <rect x="580" y="250" width="90" height="90.0" rx="4" fill="#ef4444"/>
  <text x="625" y="360" font-size="14" font-weight="700" fill="#1a2433" text-anchor="middle">&#8722;0.643</text>
  <text x="625" y="234" font-size="12.5" fill="#334155" text-anchor="middle">E&#8321;&#8321;</text>
  <text x="625" y="220" font-size="10.5" fill="#5a6b7d" text-anchor="middle">X , b&#8242;</text>

  <text x="780" y="424" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
