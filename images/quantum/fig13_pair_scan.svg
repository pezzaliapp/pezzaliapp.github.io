<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Helvetica, Arial, sans-serif">
  <title>Figure 13 — Phase A pair-scan ranking</title>
  <desc>Author: Alessandro Pezzali. Six candidate bonds ranked by score r. The two bonds on the central hub qubit Q8 are the worst. Tie-break re-measurements (hollow markers) show bond (0,1) stable while (2,5) and (15,16) dropped, which is why (0,1) was chosen.</desc>
  <metadata>Author: Alessandro Pezzali. Copyright 2026 Alessandro Pezzali. All rights reserved.</metadata>
  <rect x="0" y="0" width="820" height="460" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1a2433">Pair-scan ranking: periphery beats centre</text>
  <text x="40" y="72" font-size="14" fill="#5a6b7d">Score r = &#189;(P&#8320;&#8320;+P&#8321;&#8321;) + &#189;E&#8339;&#8339; per bond &#8212; higher is better (y-axis zoomed to 0.85&#8211;0.95)</text>
  <line x1="40" y1="88" x2="780" y2="88" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- y grid: 0.95 at y=120 .. 0.85 at y=360, 2400px/unit -->
  <g stroke="#eef2f6" stroke-width="1">
    <line x1="110" y1="120" x2="740" y2="120"/>
    <line x1="110" y1="168" x2="740" y2="168"/>
    <line x1="110" y1="216" x2="740" y2="216"/>
    <line x1="110" y1="264" x2="740" y2="264"/>
    <line x1="110" y1="312" x2="740" y2="312"/>
  </g>
  <line x1="110" y1="360" x2="740" y2="360" stroke="#334155" stroke-width="1.4"/>
  <line x1="110" y1="112" x2="110" y2="360" stroke="#94a3b8" stroke-width="1.3"/>
  <g font-size="11" fill="#5a6b7d" text-anchor="end">
    <text x="102" y="124">0.95</text>
    <text x="102" y="172">0.93</text>
    <text x="102" y="220">0.91</text>
    <text x="102" y="268">0.89</text>
    <text x="102" y="316">0.87</text>
    <text x="102" y="364">0.85</text>
  </g>
  <text x="60" y="240" font-size="12" fill="#5a6b7d" text-anchor="middle" transform="rotate(-90 60 240)">score r</text>

  <!-- bars: centres 150,255,360,465,570,675 ; width 70 -->
  <!-- (2,5) 0.935 -->
  <rect x="115" y="156" width="70" height="204" rx="4" fill="#3b82f6"/>
  <text x="150" y="147" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.935</text>
  <!-- (0,1) 0.931 winner -->
  <rect x="220" y="165.6" width="70" height="194.4" rx="4" fill="#3b82f6"/>
  <rect x="220" y="165.6" width="70" height="194.4" rx="4" fill="none" stroke="#ea8a2f" stroke-width="3"/>
  <text x="255" y="147" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.931</text>
  <!-- (15,16) 0.930 -->
  <rect x="325" y="168" width="70" height="192" rx="4" fill="#3b82f6"/>
  <text x="360" y="147" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.930</text>
  <!-- (7,11) 0.902 -->
  <rect x="430" y="235.2" width="70" height="124.8" rx="4" fill="#3b82f6"/>
  <text x="465" y="226" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.902</text>
  <!-- (4,8) 0.886 center -->
  <rect x="535" y="273.6" width="70" height="86.4" rx="4" fill="#ef4444"/>
  <text x="570" y="264" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.886</text>
  <!-- (8,12) 0.875 center -->
  <rect x="640" y="300" width="70" height="60" rx="4" fill="#ef4444"/>
  <text x="675" y="291" font-size="13.5" font-weight="700" fill="#1a2433" text-anchor="middle">0.875</text>

  <!-- tie-break markers (session 2) -->
  <!-- (2,5) dropped to 0.907 -->
  <line x1="150" y1="156" x2="150" y2="219" stroke="#1a2433" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="150" cy="223.2" r="6" fill="#ffffff" stroke="#1a2433" stroke-width="2"/>
  <text x="120" y="227" font-size="10.5" fill="#ef4444" text-anchor="end">&#8722;0.028</text>
  <!-- (0,1) stable at 0.931 -->
  <circle cx="255" cy="165.6" r="6" fill="#ffffff" stroke="#1a2433" stroke-width="2"/>
  <text x="255" y="112" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">stable &#10003;</text>
  <line x1="255" y1="118" x2="255" y2="158" stroke="#16a34a" stroke-width="1.1"/>
  <!-- (15,16) dropped to 0.896 -->
  <line x1="360" y1="168" x2="360" y2="245" stroke="#1a2433" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="360" cy="249.6" r="6" fill="#ffffff" stroke="#1a2433" stroke-width="2"/>
  <text x="390" y="253" font-size="10.5" fill="#ef4444" text-anchor="start">&#8722;0.034</text>

  <!-- x labels -->
  <g font-size="13" font-weight="600" fill="#1a2433" text-anchor="middle">
    <text x="150" y="382">(2,5)</text>
    <text x="255" y="382">(0,1)</text>
    <text x="360" y="382">(15,16)</text>
    <text x="465" y="382">(7,11)</text>
    <text x="570" y="382">(4,8)</text>
    <text x="675" y="382">(8,12)</text>
  </g>
  <g font-size="10" fill="#5a6b7d" text-anchor="middle">
    <text x="150" y="398">edge&#8211;bulk</text>
    <text x="255" y="398">ancilla&#8211;corner</text>
    <text x="360" y="398">corner&#8211;ancilla</text>
    <text x="465" y="398">edge&#8211;bulk</text>
    <text x="570" y="398" fill="#ef4444">hub Q8</text>
    <text x="675" y="398" fill="#ef4444">hub Q8</text>
  </g>

  <!-- legend -->
  <circle cx="470" cy="120" r="6" fill="#3b82f6"/>
  <text x="482" y="124" font-size="11.5" fill="#334155">session 1</text>
  <circle cx="560" cy="120" r="6" fill="#ffffff" stroke="#1a2433" stroke-width="2"/>
  <text x="572" y="124" font-size="11.5" fill="#334155">tie-break (session 2)</text>

  <text x="780" y="448" font-size="10.5" fill="#9aa7b4" text-anchor="end">Alessandro Pezzali &#183; 2026</text>
</svg>
